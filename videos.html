<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>チャンネル動画分析</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<link rel="stylesheet" href="css/style.css">
<style>
  .vt-wrap { overflow-x: auto; }
  .vt { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
  .vt th, .vt td { padding: 0.35rem 0.5rem; border-bottom: 1px solid var(--border); text-align: left; vertical-align: top; }
  .vt th { color: var(--text-dim); font-weight: 600; white-space: nowrap; position: sticky; top: 0; background: var(--bg, #fff); }
  .vt .num { text-align: right; white-space: nowrap; font-variant-numeric: tabular-nums; }
  .vt .date { white-space: nowrap; color: var(--text-dim); }
  .vt .title a { color: inherit; }
  .vt tr.tier-hit { background: rgba(26, 127, 55, 0.07); }
  .vt tr.tier-semi { background: rgba(191, 135, 0, 0.06); }
  .vt .na { color: var(--text-dim); }
  .vt .ad-suspect { color: #cf222e; font-weight: 600; }
  .vt .ad-ok { color: #1a7f37; }
  .vt-note { color: var(--text-dim); font-size: 0.8rem; margin: 0.4rem 0 0.8rem; }
  header .meta a { margin-right: 0.6rem; }
</style>
</head>
<body>
<header>
  <h1 id="page-title">📋 チャンネル動画分析</h1>
  <div class="meta"><a href="index.html">← ダッシュボードへ戻る</a><span id="generated-at"></span></div>
</header>
<main id="out"><p>loading...</p></main>
<script>
const fmtN = (n) => (n == null ? "—" : n.toLocaleString("ja-JP"));
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

function adCell(v) {
  if (v.ad_check === "suspect") return `<span class="ad-suspect" title="like率0.4%未満 または 期待like数の50%未満">⚠️疑い</span>`;
  if (v.ad_check === "ok") return `<span class="ad-ok" title="回帰基準線に対し健全${v.likes_vs_exp_pct != null ? ` (期待比${v.likes_vs_exp_pct}%)` : ""}">✓健全</span>`;
  if (v.ad_check === "unknown") return `<span class="na">like非公開</span>`;
  return `<span class="na" title="500再生未満は判定対象外">—</span>`;
}

(async () => {
  const res = await fetch("data/dashboard.json", { cache: "no-store" });
  const data = await res.json();
  const params = new URLSearchParams(location.search);
  const chId = params.get("ch");
  const channels = data.channels || [];
  const ch = channels.find((c) => c.id === chId) || channels[0];
  const out = document.getElementById("out");
  if (!ch) { out.innerHTML = "<p>チャンネルデータなし</p>"; return; }

  document.getElementById("page-title").textContent = `📋 ${ch.title} — 全動画分析`;
  document.getElementById("generated-at").textContent = "updated: " + (data.generated_at || "").slice(0, 16).replace("T", " ") + " UTC";
  document.title = `${ch.title} 動画分析`;

  // 他チャンネルへの切替リンク
  const nav = channels.map((c) =>
    c.id === ch.id ? `<strong>${esc(c.title)}</strong>`
      : `<a href="videos.html?ch=${encodeURIComponent(c.id)}">${esc(c.title)}</a>`).join(" ・ ");

  const rows = (ch.video_table || []).map((v) => {
    const tier = ch.hit_threshold && v.views >= ch.hit_threshold ? "tier-hit"
      : ch.semi_threshold && v.views >= ch.semi_threshold ? "tier-semi" : "";
    const mult = ch.baseline_median ? (v.views / ch.baseline_median).toFixed(1) : null;
    const cells = [1, 3, 7, 14, 28].map((n) =>
      `<td class="num" title="公開${n}日後時点の views (日次観測から復元。— は観測開始前で不明)">${v["d" + n] != null ? fmtN(v["d" + n]) : '<span class="na">—</span>'}</td>`).join("");
    return `
    <tr class="${tier}">
      <td class="date">${esc(v.published_at)}</td>
      <td class="title"><a href="${v.url}" target="_blank" rel="noopener">${esc(v.title)}</a></td>
      <td class="num"><strong>${fmtN(v.views)}</strong>${mult ? `<br><span class="na" title="普段(中央値 ${fmtN(ch.baseline_median)}v)の何倍か">${mult}倍</span>` : ""}</td>
      <td class="num">${v.like_pct != null ? v.like_pct + "%" : "—"}</td>
      <td>${adCell(v)}</td>
      ${cells}
    </tr>`;
  }).join("");

  out.innerHTML = `
    <p class="vt-note">チャンネル切替: ${nav}</p>
    <p class="vt-note">全 ${(ch.video_table || []).length} 本 (Shorts除外・新しい順)。
    普段(中央値) <strong>${fmtN(ch.baseline_median)}v</strong> / 🎯HITしきい ${fmtN(ch.hit_threshold)}v (行が緑) / 🚀準HIT ${fmtN(ch.semi_threshold)}v (行が黄)。
    「N日」列 = 公開N日後時点の累計 views を日次定点観測から復元 (観測開始前に公開された動画は —)。
    広告判定 = like数の回帰基準線 (docs/ad_check_methodology.md)。</p>
    <div class="vt-wrap">
      <table class="vt">
        <thead><tr>
          <th>投稿日</th><th>タイトル</th><th>views (普段比)</th><th>like率</th><th>広告</th>
          <th>1日</th><th>3日</th><th>7日</th><th>14日</th><th>28日</th>
        </tr></thead>
        <tbody>${rows || '<tr><td colspan="10">データなし</td></tr>'}</tbody>
      </table>
    </div>`;
})();
</script>
</body>
</html>
