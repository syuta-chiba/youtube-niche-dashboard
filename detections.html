<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>検知フィード — YouTube Niche Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛰️</text></svg>">
<link rel="stylesheet" href="css/style.css">
<style>
/* 🛰 検知フィード — スマホで読みやすい縦積みカード */
.feed-wrap { max-width: 760px; margin: 0 auto; padding: 0 1rem 3rem; }
.feed-intro { color: var(--text-dim); font-size: 0.85rem; margin: 0.8rem 0 1.4rem; }
.feed-section { margin: 1.8rem 0 0.8rem; }
.feed-section h2 { font-size: 1.05rem; margin: 0 0 0.2rem; }
.feed-section .feed-desc { color: var(--text-dim); font-size: 0.8rem; margin: 0 0 0.6rem; }
.feed-empty { color: var(--text-dim); font-size: 0.85rem; padding: 0.4rem 0; }

.card {
  display: flex;
  gap: 0.8rem;
  padding: 0.9rem 0;
  border-bottom: 1px solid var(--border);
}
.card-thumb {
  flex: 0 0 auto;
  width: 120px;
}
.card-thumb img {
  width: 120px;
  height: 68px;
  object-fit: cover;
  border-radius: 6px;
  display: block;
}
.card-body { min-width: 0; flex: 1 1 auto; }
.card-title {
  font-weight: 600;
  font-size: 0.94rem;
  line-height: 1.4;
  margin: 0 0 0.15rem;
}
.card-title a { color: var(--text); text-decoration: none; }
.card-title a:hover { text-decoration: underline; }
.card-ch { color: var(--text-dim); font-size: 0.82rem; margin: 0 0 0.5rem; }
.card-facts {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem 0.9rem;
  font-size: 0.82rem;
}
.card-facts li { white-space: nowrap; }
.card-facts .lbl { color: var(--text-dim); margin-right: 0.25rem; }
.card-facts .up { color: var(--pos); font-weight: 600; }
.card-facts .big { color: var(--hit); font-weight: 700; }

.badge {
  display: inline-block;
  padding: 0.12rem 0.5rem;
  border-radius: 999px;
  font-size: 0.72rem;
  font-weight: 600;
  border: 1px solid var(--border);
  white-space: nowrap;
}
.badge-rush { color: var(--hit); border-color: rgba(207,34,46,0.4); background: rgba(207,34,46,0.06); }
.badge-rss  { color: var(--accent); border-color: rgba(9,105,218,0.4); background: var(--accent-bg); }
.badge-mkt  { color: var(--pos); border-color: rgba(26,127,55,0.4); background: rgba(26,127,55,0.07); }

@media (max-width: 480px) {
  .card-thumb { width: 96px; }
  .card-thumb img { width: 96px; height: 54px; }
}
</style>
</head>
<body>
<header>
  <h1>🛰️ 検知フィード</h1>
  <div class="meta">
    <span id="generated-at">loading...</span>
    <span class="sep">·</span>
    <a href="index.html">← ダッシュボードに戻る</a>
  </div>
</header>

<div class="feed-wrap">
  <p class="feed-intro">
    観測中チャンネルと巡回プールで検知した「真似元候補」動画を、新しい順にまとめたページ。
    <strong>6時間ごとに自動更新</strong>（GitHub Actions）。
  </p>
  <div id="feed"></div>
</div>

<script>
const fmtN = (n) => n == null ? "—" : Number(n).toLocaleString("en-US");
const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, (c) =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

function fmtDate(s) {
  if (!s) return "—";
  return String(s).slice(0, 10);
}

function card({ videoId, url, title, channel, facts, badge }) {
  const thumb = videoId
    ? `<img src="https://i.ytimg.com/vi/${encodeURIComponent(videoId)}/mqdefault.jpg" alt="" loading="lazy">`
    : "";
  const factItems = facts.filter(Boolean).map((f) => `<li>${f}</li>`).join("");
  return `
    <div class="card">
      <div class="card-thumb"><a href="${esc(url)}" target="_blank" rel="noopener">${thumb}</a></div>
      <div class="card-body">
        <p class="card-title"><a href="${esc(url)}" target="_blank" rel="noopener">${esc(title)}</a></p>
        <p class="card-ch">${badge} ${esc(channel || "")}</p>
        <ul class="card-facts">${factItems}</ul>
      </div>
    </div>`;
}

function section(id, title, desc, cards) {
  return `
    <div class="feed-section">
      <h2>${title}</h2>
      <p class="feed-desc">${desc}</p>
      ${cards.length ? cards.join("") : '<p class="feed-empty">（まだ検知なし）</p>'}
    </div>`;
}

fetch("data/dashboard.json?" + Date.now())
  .then((r) => r.json())
  .then((d) => {
    document.getElementById("generated-at").textContent =
      "更新 " + (d.generated_at ? new Date(d.generated_at).toLocaleString("ja-JP") : "—");

    const eh = d.external_hits || [];
    const byPub = (a, b) => String(b.published_at || "").localeCompare(String(a.published_at || ""));

    // 🎯 急伸検知（直近24h・観測中チャンネル）
    const rep = (d.daily_reports || [])[0] || {};
    const rushCards = (rep.priority || []).map((v) => card({
      videoId: v.video_id,
      url: `https://www.youtube.com/watch?v=${encodeURIComponent(v.video_id)}`,
      title: v.title,
      channel: v.channel,
      badge: '<span class="badge badge-rush">🎯 急伸</span>',
      facts: [
        `<span class="lbl">views</span><span class="big">${fmtN(v.views)}</span>`,
        v.delta != null ? `<span class="lbl">+昨日</span><span class="up">+${fmtN(v.delta)}</span>` : null,
      ],
    }));

    // 📡 RSS巡回検知（プール ch が跳ねた瞬間）
    const rssCards = eh.filter((x) => x.source === "rss_patrol").sort(byPub).map((v) => card({
      videoId: v.video_id,
      url: v.url,
      title: v.title,
      channel: v.channel,
      badge: '<span class="badge badge-rss">📡 RSS巡回</span>',
      facts: [
        `<span class="lbl">views</span><span class="big">${fmtN(v.views)}</span>`,
        v.score != null ? `<span class="lbl">score</span>${v.score}` : null,
        v.subs != null ? `<span class="lbl">登録</span>${fmtN(v.subs)}` : null,
        `<span class="lbl">公開</span>${fmtDate(v.published_at)}`,
      ],
    }));

    // 🌍 市場検証 HIT（YouTube 全体で同テーマが跳ねた）
    const mktCards = eh.filter((x) => x.source === "market_validate").sort(byPub).map((v) => card({
      videoId: v.video_id,
      url: v.url,
      title: v.title,
      channel: v.channel,
      badge: '<span class="badge badge-mkt">🌍 市場検証</span>',
      facts: [
        `<span class="lbl">views</span><span class="big">${fmtN(v.views)}</span>`,
        v.score != null ? `<span class="lbl">score</span>${v.score}` : null,
        v.subs != null ? `<span class="lbl">登録</span>${fmtN(v.subs)}` : null,
        `<span class="lbl">公開</span>${fmtDate(v.published_at)}`,
      ],
    }));

    document.getElementById("feed").innerHTML =
      section("rush", "🎯 急伸検知（直近24h）",
        "観測中チャンネルで直近24hに跳ねた動画。真似元の“今開いている窓”。", rushCards) +
      section("rss", "📡 RSS巡回検知",
        "巡回プール（注目枠外の競合候補）で跳ねた瞬間の再浮上シグナル。目視確認を。", rssCards) +
      section("mkt", "🌍 市場検証 HIT",
        "急伸テーマを YouTube 全体で検索し、外部chの普段の5倍以上を検知したもの。", mktCards);
  })
  .catch((e) => {
    document.getElementById("feed").innerHTML =
      '<p class="feed-empty">データの読み込みに失敗しました: ' + esc(e.message) + "</p>";
  });
</script>
</body>
</html>
